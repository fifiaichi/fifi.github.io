    <style>
        html { scroll-behavior: smooth; }
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            z-index: 100;
            width: 0%;
            transition: width 0.1s linear;
        }
        .back-to-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 90;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(102,126,234,0.35);
        }
        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .back-to-top:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(102,126,234,0.5);
        }
        /* 骨架屏加载 */
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 8px;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
            background-size: 200% 100%;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* 图片淡入 */
        img.lazy-fade {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        img.lazy-fade.loaded {
            opacity: 1;
        }
        /* 卡片入场动画 */
        .card-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .card-reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script>
        // ==================== 全局函数 ====================

        // 图片预览
        let currentImageIndex = 0;
        let projectImages = [];

        function openImageModal(imgSrc) {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('image-modal-img');
            const content = document.getElementById('image-modal-content');

            img.src = imgSrc;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
            document.body.style.overflow = 'hidden';

            // 更新当前索引以便后续可能的切换功能
            const currentId = new URLSearchParams(window.location.search).get('id') || 'tian-gong-zao-wu';
            const project = projectData[currentId];
            if (project && project.images) {
                projectImages = project.images;
                currentImageIndex = projectImages.indexOf(imgSrc);
            }
        }

        function closeImageModal() {
            const modal = document.getElementById('image-modal');
            const content = document.getElementById('image-modal-content');

            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }

        // 缩放功能
        let scale = 1;
        function zoomImage(delta) {
            const img = document.getElementById('image-modal-img');
            scale = Math.max(0.5, Math.min(3, scale + delta));
            img.style.transform = `scale(${scale})`;
        }

        function resetZoom() {
            scale = 1;
            document.getElementById('image-modal-img').style.transform = 'scale(1)';
        }

        // 返回逻辑优化：返回作品列表并平滑滚动定位到作品板块中心
        function goBack() {
            const hasReferrer = document.referrer && document.referrer.includes(window.location.hostname);
            
            if (hasReferrer && document.referrer.includes('index.html')) {
                // 如果来自首页，直接返回并利用hash触发平滑滚动
                window.location.href = 'index.html#works';
            } else if (hasReferrer && document.referrer.includes('animation-list.html')) {
                // 如果来自动画列表页，返回动画列表页
                window.location.href = 'animation-list.html';
            } else {
                // 其他情况，返回首页作品板块
                window.location.href = 'index.html#works';
            }
        }

        // 视频错误处理函数 - 当本地视频加载失败时降级到B站链接
        function handleVideoError(projectId, bilibiliUrl, posterUrl) {
            const loadingEl = document.getElementById('video-loading-' + projectId);
            const playerEl = document.getElementById('video-player-' + projectId);

            // 隐藏加载动画
            if (loadingEl) {
                loadingEl.style.display = 'none';
            }

            if (playerEl) {
                // 创建美观的错误提示界面
                const errorHTML = bilibiliUrl ? `
                    <!-- 有B站链接：显示封面 + 播放按钮 -->
                    <div class="relative w-full aspect-video bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex items-center justify-center overflow-hidden">
                        <!-- 背景封面图 -->
                        <img src="${posterUrl || 'image/placeholder-video.jpg'}" 
                             alt="视频封面" 
                             class="absolute inset-0 w-full h-full object-cover opacity-30 blur-sm scale-110">

                        <!-- 玻璃态卡片 -->
                        <div class="relative z-10 text-center p-8 bg-white/5 backdrop-blur-xl rounded-3xl border border-white/10 shadow-2xl max-w-md mx-4">
                            <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-r from-pink-500 to-rose-400 rounded-2xl flex items-center justify-center shadow-lg shadow-pink-500/20">
                                <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M18.271 19.5c3.141-1.29 5.271-4.61 5.271-8.5s-2.13-7.21-5.271-8.5l-1.898.666c2.606 1.037 4.698 3.561 4.698 6.834s-2.092 5.797-4.698 6.834l1.898.666zM14 13v-2l4 2-4 2zm-4-5H4V6h6V4l6 3-6 3V9z"/>
                                </svg>
                            </div>
                            <h3 class="text-xl font-bold text-white mb-2">视频加载失败</h3>
                            <p class="text-white/50 text-sm mb-6">本地视频文件可能未正确上传，您可以前往B站观看</p>
                            <a href="${bilibiliUrl}" target="_blank" 
                               class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-[#fb7299] to-[#ff85a2] text-white font-medium rounded-full hover:shadow-lg hover:shadow-pink-500/30 hover:scale-105 transition-all duration-300">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.271 19.5c3.141-1.29 5.271-4.61 5.271-8.5s-2.13-7.21-5.271-8.5l-1.898.666c2.606 1.037 4.698 3.561 4.698 6.834s-2.092 5.797-4.698 6.834l1.898.666zM14 13v-2l4 2-4 2zm-4-5H4V6h6V4l6 3-6 3V9z"/></svg>
                                <span>前往B站观看</span>
                            </a>
                        </div>
                    </div>

                if (qaBadge) qaBadge.classList.remove('hidden');
            }

            // 滚动动画
            const fadeElements = document.querySelectorAll('.fade-in');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            fadeElements.forEach(el => observer.observe(el));

            // 滚动进度条 + 返回顶部
            const scrollProgress = document.getElementById('scroll-progress');
            const backToTop = document.getElementById('back-to-top');
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                if (docHeight > 0 && scrollProgress) {
                    scrollProgress.style.width = Math.min((scrollY / docHeight) * 100, 100) + '%';
                }
                if (backToTop) {
                    backToTop.classList.toggle('visible', scrollY > 500);
                }
            });

            // 图片淡入加载
            document.querySelectorAll('img').forEach(img => {
                if (!img.closest('#cert-modal') && !img.closest('#image-modal')) {
                    img.classList.add('lazy-fade');
                    if (img.complete && img.naturalWidth > 0) {
                        img.classList.add('loaded');
                    } else {
                        img.addEventListener('load', () => img.classList.add('loaded'));
                        img.addEventListener('error', () => { img.style.opacity = '0.4'; img.classList.add('loaded'); });

            }

            showcaseContainer.innerHTML = showcaseHtml;
            // 视频加载超时检测（8秒后如果还没加载成功，手动触发错误）
            setTimeout(() => {
                const video = document.getElementById('video-player-' + (projectId || 'default'));
                const loading = document.getElementById('video-loading-' + (projectId || 'default'));

                // readyState: 0 = 未加载, 1 = 元数据已加载, 2 = 可播放当前帧, 3 = 可播放, 4 = 足够播放
                if (video && video.readyState === 0 && loading && loading.style.display !== 'none') {
                    console.log('视频加载超时，手动触发错误处理');
                    handleVideoError(projectId || 'default', project.bilibili || '', project.poster || '');
                }
            }, 8000);  // 8秒超时


            // 动态内容图片淡入
            setTimeout(() => {
                showcaseContainer.querySelectorAll('img').forEach(img => {
                    img.classList.add('lazy-fade');
                    if (img.complete && img.naturalWidth > 0) {
                        img.classList.add('loaded');
                    } else {
                        img.addEventListener('load', () => img.classList.add('loaded'));
                        img.addEventListener('error', () => { img.style.opacity = '0.4'; img.classList.add('loaded'); });
                    }
                });
            }, 100);

            // 更新页面标题
            document.title = `${project.title} - 作品详情 - 张省菲作品集`;

            // 更新项目图片区
            const imagesContainer = document.getElementById('project-images');
            if (project.images && project.images.length > 0 && !project.isIllustrationProcess) {
                const imgsHtml = project.images.map(img => `
                    <div class="aspect-square bg-gray-100 dark:bg-gray-800 rounded-xl overflow-hidden shadow-sm cursor-pointer" onclick="openImageModal('${img}')">
                        <img loading="lazy" src="${img}" alt="项目图片" class="w-full h-full object-cover">
                    </div>
                `).join('');
                imagesContainer.innerHTML = imgsHtml;
            } else {
                document.getElementById('project-images-section').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
